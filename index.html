<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>体重日記</title>
<link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Kaisei+Decol:wght@400;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fdf6f8; }
input:focus { border-color: #f4aebe !important; }
button:active { opacity: .85; }
.rh:hover .di { opacity: 1 !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const STORAGE_KEYS = {
  records: "weight-records-v2",
  goal: "weight-goal",
  meals: "weight-meals",
  calGoal: "weight-cal-goal",
  proteinGoal: "weight-protein-goal",
  title: "weight-title",
};

const fmtDate = (d) => { const x = new Date(d); return `${x.getMonth()+1}/${x.getDate()}`; };
const fmtFull = (d) => { const x = new Date(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`; };
const fmtTime = (d) => { const x = new Date(d); return `${String(x.getHours()).padStart(2,"0")}:${String(x.getMinutes()).padStart(2,"0")}`; };
const todayStr = () => fmtFull(new Date());
const nowISO = () => new Date().toISOString();

const T = {
  bg:"#fdf6f8", surface:"#ffffff", surfaceRaised:"#fff7f9",
  border:"rgba(180,120,140,0.12)", borderSubtle:"rgba(180,120,140,0.06)",
  fg:"#3d2b33", secondary:"#7d5f6b", muted:"#b8949f", faint:"#dcc5cc",
  accent:"#e8688a", accentSoft:"#f4aebe", accentBg:"#fdeef2",
  success:"#5dab80", successBg:"#edf7f1", danger:"#d46a6a", dangerBg:"#fdf0f0",
  shadow:"0 1px 3px rgba(140,80,100,0.08)",
  fontTitle:"'Kaisei Decol','Hachi Maru Pop','Zen Maru Gothic',sans-serif",
  font:"'Zen Maru Gothic','Rounded Mplus 1c',sans-serif",
  mono:"'SF Mono','Fira Code','Roboto Mono',monospace",
  ease:"cubic-bezier(0.25,1,0.5,1)", dur:"150ms", r1:8, r2:12,
};
const mono = { fontFamily:T.mono, fontVariantNumeric:"tabular-nums" };

const IcoScale = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3" opacity=".6"/></svg>;
const IcoChart = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
const IcoFood = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>;
const IcoGear = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>;
const IcoTarget = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
const IcoTrash = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>;
const IcoX = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
const IcoPencil = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
const IcoCheck = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
const IcoDown = () => <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>;
const IcoUp = () => <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>;
const IcoFlower = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={T.accent} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3" fill={T.accentSoft}/><circle cx="12" cy="6" r="3" fill="none"/><circle cx="17.2" cy="9" r="3" fill="none"/><circle cx="15.5" cy="15" r="3" fill="none"/><circle cx="8.5" cy="15" r="3" fill="none"/><circle cx="6.8" cy="9" r="3" fill="none"/></svg>;

function WeightTracker() {
  const [records, setRecords] = useState([]);
  const [meals, setMeals] = useState([]);
  const [goalWeight, setGoalWeight] = useState(90);
  const [startWeight] = useState(102);
  const [currentWeight, setCurrentWeight] = useState("");
  const [selectedDate, setSelectedDate] = useState(todayStr());
  const [mealText, setMealText] = useState("");
  const [mealCalorie, setMealCalorie] = useState("");
  const [mealProtein, setMealProtein] = useState("");
  const [tab, setTab] = useState("record");
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState("");
  const [editingGoal, setEditingGoal] = useState(false);
  const [tempGoal, setTempGoal] = useState("");
  const [graphRange, setGraphRange] = useState(30);
  const [historyDate, setHistoryDate] = useState(null);
  const [calGoal, setCalGoal] = useState(1800);
  const [editingCalGoal, setEditingCalGoal] = useState(false);
  const [tempCalGoal, setTempCalGoal] = useState("");
  const [proteinGoal, setProteinGoal] = useState(80);
  const [editingProteinGoal, setEditingProteinGoal] = useState(false);
  const [tempProteinGoal, setTempProteinGoal] = useState("");
  const [mealHistoryDate, setMealHistoryDate] = useState(null);
  const [appTitle, setAppTitle] = useState("しょーちゃんの体重日記");
  const [editingTitle, setEditingTitle] = useState(false);
  const [tempTitle, setTempTitle] = useState("");
  const [editingMeal, setEditingMeal] = useState(null);
  const [editMealText, setEditMealText] = useState("");
  const [editMealCalorie, setEditMealCalorie] = useState("");
  const [editMealProtein, setEditMealProtein] = useState("");

  const showToast = (m) => { setToast(m); setTimeout(() => setToast(""), 2000); };

  useEffect(() => {
    try {
      const a = localStorage.getItem(STORAGE_KEYS.records);
      const b = localStorage.getItem(STORAGE_KEYS.goal);
      const c = localStorage.getItem(STORAGE_KEYS.meals);
      const d = localStorage.getItem(STORAGE_KEYS.calGoal);
      const e = localStorage.getItem(STORAGE_KEYS.title);
      const f = localStorage.getItem(STORAGE_KEYS.proteinGoal);
      if (a) setRecords(JSON.parse(a));
      if (b) setGoalWeight(Number(b));
      if (c) setMeals(JSON.parse(c));
      if (d) setCalGoal(Number(d));
      if (e) setAppTitle(e);
      if (f) setProteinGoal(Number(f));
    } catch(e) { console.error(e); }
    setLoading(false);
  }, []);

  const saveR = (r) => { setRecords(r); try { localStorage.setItem(STORAGE_KEYS.records, JSON.stringify(r)); } catch{} };
  const saveM = (m) => { setMeals(m); try { localStorage.setItem(STORAGE_KEYS.meals, JSON.stringify(m)); } catch{} };
  const saveG = (v) => { setGoalWeight(v); try { localStorage.setItem(STORAGE_KEYS.goal, String(v)); } catch{} };
  const saveCG = (v) => { setCalGoal(v); try { localStorage.setItem(STORAGE_KEYS.calGoal, String(v)); } catch{} };
  const savePG = (v) => { setProteinGoal(v); try { localStorage.setItem(STORAGE_KEYS.proteinGoal, String(v)); } catch{} };
  const saveTitle = (v) => { setAppTitle(v); try { localStorage.setItem(STORAGE_KEYS.title, v); } catch{} };

  const addWeight = () => {
    if (!currentWeight || isNaN(Number(currentWeight))) return;
    const newRec = { id: Date.now(), date: selectedDate, weight: Number(currentWeight), timestamp: nowISO() };
    const nr = [...records, newRec].sort((a,b) => a.date.localeCompare(b.date) || a.timestamp.localeCompare(b.timestamp));
    saveR(nr); setCurrentWeight(""); showToast("きろくしたよ ✿");
  };
  const deleteRecord = (id) => { saveR(records.filter(r => r.id !== id)); };
  const addMeal = () => {
    if (!mealText.trim()) return;
    saveM([...meals, { id: Date.now(), date: selectedDate, text: mealText.trim(), calorie: mealCalorie ? Number(mealCalorie) : null, protein: mealProtein ? Number(mealProtein) : null }]);
    setMealText(""); setMealCalorie(""); setMealProtein(""); showToast("ごはん きろくしたよ ✿");
  };
  const startEditMeal = (m) => { setEditingMeal(m.id); setEditMealText(m.text); setEditMealCalorie(m.calorie!=null?String(m.calorie):""); setEditMealProtein(m.protein!=null?String(m.protein):""); };
  const saveEditMeal = () => {
    if (!editMealText.trim()) return;
    saveM(meals.map(m => m.id===editingMeal ? {...m, text:editMealText.trim(), calorie:editMealCalorie?Number(editMealCalorie):null, protein:editMealProtein?Number(editMealProtein):null} : m));
    setEditingMeal(null); showToast("しゅうせいしたよ ✿");
  };

  const dailyMin = {};
  records.forEach(r => { if (!dailyMin[r.date] || r.weight < dailyMin[r.date]) dailyMin[r.date] = r.weight; });
  const dailyMinArr = Object.entries(dailyMin).map(([date,weight]) => ({date,weight})).sort((a,b) => a.date.localeCompare(b.date));
  const recordsByDate = {};
  records.forEach(r => { if (!recordsByDate[r.date]) recordsByDate[r.date]=[]; recordsByDate[r.date].push(r); });
  const sortedDates = Object.keys(recordsByDate).sort().reverse();

  const latest = dailyMinArr.length > 0 ? dailyMinArr[dailyMinArr.length-1] : null;
  const latestW = latest ? latest.weight : startWeight;
  const diffGoal = latestW - goalWeight;
  const diffStart = latestW - startWeight;
  const dayMeals = meals.filter(m => m.date === selectedDate);
  const dayCal = dayMeals.reduce((s,m) => s+(m.calorie||0), 0);
  const dayProtein = dayMeals.reduce((s,m) => s+(m.protein||0), 0);
  const pct = startWeight !== goalWeight ? Math.min(100,Math.max(0,((startWeight-latestW)/(startWeight-goalWeight))*100)) : 0;
  const gRec = dailyMinArr.slice(-graphRange);

  const card = { background:T.surface, borderRadius:T.r2, padding:16, marginBottom:12, boxShadow:T.shadow, border:`0.5px solid ${T.border}` };
  const inp = { width:"100%", padding:"12px 16px", border:`1px solid ${T.border}`, borderRadius:T.r1, fontSize:14, fontFamily:T.font, outline:"none", background:T.surfaceRaised, color:T.fg, boxSizing:"border-box", transition:`border-color ${T.dur} ${T.ease}` };
  const btnP = { width:"100%", padding:"12px 16px", border:"none", borderRadius:T.r1, background:T.accent, color:"#fff", fontSize:14, fontWeight:600, cursor:"pointer", fontFamily:T.font, transition:`opacity ${T.dur} ${T.ease}` };
  const lbl = { fontSize:12, color:T.muted, fontWeight:500, marginBottom:4, display:"block" };
  const tabS = (t) => ({
    flex:1, display:"inline-flex", alignItems:"center", justifyContent:"center", gap:4,
    padding:"8px 0", border:"none", background: tab===t ? T.surface : "transparent",
    color: tab===t ? T.accent : T.muted, fontWeight: tab===t ? 600 : 400, fontSize:13,
    cursor:"pointer", borderRadius:T.r1, transition:`all ${T.dur} ${T.ease}`,
    fontFamily:T.font, boxShadow: tab===t ? T.shadow : "none", whiteSpace:"nowrap",
  });

  const renderGraph = () => {
    if (gRec.length < 2) return <div style={{textAlign:"center",padding:"48px 16px",color:T.muted,fontSize:13,fontFamily:T.font}}>2日分以上のデータがたまると<br/>グラフが見れるよ ✿</div>;
    const W=640, H=280, PD={t:24,r:24,b:40,l:48};
    const pW=W-PD.l-PD.r, pH=H-PD.t-PD.b;
    const ws=gRec.map(r=>r.weight);
    const mn=Math.min(...ws,goalWeight)-1, mx=Math.max(...ws)+1, rng=mx-mn||1;
    const pts=gRec.map((r,i)=>({x:PD.l+(i/(gRec.length-1))*pW, y:PD.t+(1-(r.weight-mn)/rng)*pH, w:r.weight, d:r.date}));
    const gY=PD.t+(1-(goalWeight-mn)/rng)*pH;
    const line=pts.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ");
    const area=line+` L ${pts[pts.length-1].x} ${PD.t+pH} L ${pts[0].x} ${PD.t+pH} Z`;
    const yN=5, yL=Array.from({length:yN+1},(_,i)=>mn+(rng*i)/yN);
    return (
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
        {yL.map((v,i)=>{ const y=PD.t+(1-(v-mn)/rng)*pH; return(<g key={i}><line x1={PD.l} y1={y} x2={W-PD.r} y2={y} stroke={T.borderSubtle} strokeWidth="1"/><text x={PD.l-8} y={y+4} textAnchor="end" fontSize="11" fill={T.muted} fontFamily={T.mono}>{v.toFixed(1)}</text></g>); })}
        {gY>=PD.t && gY<=PD.t+pH && <><line x1={PD.l} y1={gY} x2={W-PD.r} y2={gY} stroke={T.accentSoft} strokeWidth="1" strokeDasharray="6,4"/><text x={W-PD.r+4} y={gY+3} fontSize="10" fill={T.accent} fontFamily={T.font} fontWeight="500">目標</text></>}
        <path d={area} fill={T.accent} opacity=".06"/>
        <path d={line} fill="none" stroke={T.accent} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
        {pts.map((p,i)=>(<g key={i}>
          <circle cx={p.x} cy={p.y} r="4" fill={T.surface} stroke={T.accent} strokeWidth="2"/>
          {(i===0||i===pts.length-1||gRec.length<=14) && <text x={p.x} y={PD.t+pH+16} textAnchor="middle" fontSize="10" fill={T.muted} fontFamily={T.font}>{fmtDate(p.d)}</text>}
          {i===pts.length-1 && <text x={p.x} y={p.y-12} textAnchor="middle" fontSize="12" fontWeight="600" fill={T.accent} fontFamily={T.mono}>{p.w}</text>}
        </g>))}
      </svg>
    );
  };

  if (loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:T.bg,fontFamily:T.font}}>
      <div style={{textAlign:"center",color:T.accentSoft}}><IcoFlower/><div style={{fontSize:13,color:T.muted,marginTop:8}}>よみこみちゅう...</div></div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:T.font}}>
      <header style={{padding:"24px 16px 16px",maxWidth:480,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <IcoFlower/>
            <h1 style={{margin:0,fontSize:20,fontWeight:400,color:T.accent,fontFamily:T.fontTitle}}>{appTitle}</h1>
          </div>
          <span style={{fontSize:11,color:T.muted,...mono}}>{todayStr()}</span>
        </div>
      </header>

      <main style={{maxWidth:480,margin:"0 auto",padding:"0 16px 96px"}}>
        {/* Status */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}}>
          <div style={card}>
            <div style={lbl}>いまの体重</div>
            <div style={{fontSize:28,fontWeight:700,color:T.accent,...mono,lineHeight:1,marginTop:4}}>{latestW}</div>
            <div style={{fontSize:11,color:T.muted,marginTop:4}}>kg</div>
            {latest && <div style={{fontSize:10,color:T.faint,marginTop:2}}>（{fmtDate(latest.date)} 最低値）</div>}
          </div>
          <div style={card}>
            <div style={lbl}>目標まで</div>
            <div style={{fontSize:28,fontWeight:700,color:diffGoal<=0?T.success:T.fg,...mono,lineHeight:1,marginTop:4}}>{diffGoal<=0?"✿":diffGoal.toFixed(1)}</div>
            <div style={{fontSize:11,color:T.muted,marginTop:4}}>{diffGoal<=0?"やったね！":"kg"}</div>
          </div>
          <div style={card}>
            <div style={lbl}>すすみぐあい</div>
            <div style={{fontSize:28,fontWeight:700,color:T.fg,...mono,lineHeight:1,marginTop:4}}>{pct.toFixed(0)}</div>
            <div style={{fontSize:11,color:T.muted,marginTop:4}}>%</div>
          </div>
        </div>

        {/* Progress bar */}
        <div style={{...card,padding:"12px 16px",marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontSize:11,color:T.muted,...mono}}>{startWeight} kg</span>
            <span style={{fontSize:11,color:T.accent,fontWeight:600,...mono}}>{goalWeight} kg</span>
          </div>
          <div style={{background:T.accentBg,borderRadius:4,height:6,overflow:"hidden"}}>
            <div style={{background:T.accent,height:"100%",borderRadius:4,width:`${pct}%`,transition:`width 200ms ${T.ease}`}}/>
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:4,background:T.accentBg,borderRadius:T.r1,padding:4,marginBottom:16}}>
          <button style={tabS("record")} onClick={()=>setTab("record")}><IcoScale/><span>きろく</span></button>
          <button style={tabS("graph")} onClick={()=>setTab("graph")}><IcoChart/><span>グラフ</span></button>
          <button style={tabS("meals")} onClick={()=>setTab("meals")}><IcoFood/><span>ごはん</span></button>
          <button style={tabS("settings")} onClick={()=>setTab("settings")}><IcoGear/></button>
        </div>

        {toast && <div style={{textAlign:"center",padding:12,background:T.successBg,borderRadius:T.r1,color:T.success,fontSize:13,fontWeight:500,marginBottom:12,border:`0.5px solid ${T.success}22`}}>{toast}</div>}

        {/* ══ RECORD ══ */}
        {tab==="record" && <div>
          <div style={card}>
            <div style={{fontSize:14,fontWeight:700,color:T.fg,marginBottom:16,fontFamily:T.fontTitle}}>⚖️ 体重をきろく</div>
            <div style={{marginBottom:12}}><div style={lbl}>日付</div><input type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)} style={inp}/></div>
            <div style={{marginBottom:16}}>
              <div style={lbl}>体重 (kg)</div>
              <input type="number" step="0.1" value={currentWeight} onChange={e=>setCurrentWeight(e.target.value)} placeholder="102.0"
                style={{...inp,fontSize:24,fontWeight:700,textAlign:"center",...mono}}
                onKeyDown={e=>e.key==="Enter"&&addWeight()}/>
            </div>
            <button onClick={addWeight} style={btnP}>きろくする</button>
            <div style={{fontSize:11,color:T.muted,textAlign:"center",marginTop:8}}>※ 1日に何回でもきろくできるよ。グラフにはその日の最低値がでます</div>
          </div>
          <div style={card}>
            <div style={{fontSize:14,fontWeight:700,color:T.fg,marginBottom:12,fontFamily:T.fontTitle}}>📋 きろくの履歴</div>
            {sortedDates.length===0
              ? <div style={{textAlign:"center",padding:24,color:T.muted,fontSize:13}}>まだ記録がないよ</div>
              : <div style={{maxHeight:360,overflowY:"auto"}}>
                {sortedDates.slice(0,30).map((date,di)=>{
                  const dayRecs=recordsByDate[date].sort((a,b)=>a.timestamp.localeCompare(b.timestamp));
                  const minW=Math.min(...dayRecs.map(r=>r.weight));
                  const maxW=Math.max(...dayRecs.map(r=>r.weight));
                  const isExpanded=historyDate===date;
                  const prevDateIdx=dailyMinArr.findIndex(d=>d.date===date);
                  const prevDay=prevDateIdx>0?dailyMinArr[prevDateIdx-1]:null;
                  const diff=prevDay?minW-prevDay.weight:0;
                  return (
                    <div key={date} style={{borderBottom:di<sortedDates.length-1?`0.5px solid ${T.borderSubtle}`:"none"}}>
                      <div onClick={()=>setHistoryDate(isExpanded?null:date)}
                        style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",cursor:"pointer"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:13,color:T.secondary,...mono}}>{fmtDate(date)}</span>
                          {dayRecs.length>1 && <span style={{fontSize:10,color:T.muted,background:T.accentBg,padding:"1px 6px",borderRadius:4}}>{dayRecs.length}回</span>}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:15,fontWeight:700,color:T.fg,...mono}}>{minW}</span>
                          {dayRecs.length>1&&minW!==maxW && <span style={{fontSize:11,color:T.faint,...mono}}>〜{maxW}</span>}
                          {prevDay&&diff!==0 && <span style={{display:"inline-flex",alignItems:"center",gap:2,fontSize:11,fontWeight:600,color:diff<0?T.success:T.danger,...mono}}>{diff<0?<IcoDown/>:<IcoUp/>}{Math.abs(diff).toFixed(1)}</span>}
                          <span style={{fontSize:10,color:T.faint,transform:isExpanded?"rotate(180deg)":"rotate(0)",transition:`transform ${T.dur} ${T.ease}`,display:"inline-block"}}>▾</span>
                        </div>
                      </div>
                      {isExpanded && <div style={{paddingBottom:8}}>
                        {dayRecs.map(r=>(
                          <div key={r.id} className="rh" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0 6px 24px"}}>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <span style={{fontSize:11,color:T.muted,...mono}}>{fmtTime(r.timestamp)}</span>
                              <span style={{fontSize:13,fontWeight:600,color:r.weight===minW?T.accent:T.secondary,...mono}}>{r.weight} kg</span>
                              {r.weight===minW&&dayRecs.length>1 && <span style={{fontSize:9,color:T.accent,background:T.accentBg,padding:"1px 4px",borderRadius:3}}>⭐</span>}
                            </div>
                            <button className="di" onClick={(e)=>{e.stopPropagation();deleteRecord(r.id);}}
                              style={{background:"none",border:"none",color:T.faint,cursor:"pointer",padding:2,opacity:0,transition:`opacity ${T.dur}`,display:"inline-flex",alignItems:"center"}}><IcoX/></button>
                          </div>
                        ))}
                      </div>}
                    </div>
                  );
                })}
              </div>
            }
          </div>
        </div>}

        {/* ══ GRAPH ══ */}
        {tab==="graph" && <div>
          <div style={card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:14,fontWeight:700,color:T.fg,fontFamily:T.fontTitle}}>📈 体重のうごき</div>
              <div style={{display:"flex",gap:2}}>
                {[7,30,90].map(n=>(
                  <button key={n} onClick={()=>setGraphRange(n)} style={{padding:"4px 8px",border:"none",borderRadius:6,fontSize:11,fontWeight:graphRange===n?600:400,background:graphRange===n?T.accentBg:"transparent",color:graphRange===n?T.accent:T.muted,cursor:"pointer",fontFamily:T.font}}>{n}日</button>
                ))}
              </div>
            </div>
            <div style={{fontSize:11,color:T.muted,marginBottom:8}}>※ 各日の最低体重をグラフに表示しています</div>
            {renderGraph()}
          </div>
          {records.length>=2 && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[
                {l:"いちばん重い",v:Math.max(...Object.values(dailyMin)).toFixed(1),u:"kg"},
                {l:"いちばん軽い",v:Math.min(...Object.values(dailyMin)).toFixed(1),u:"kg"},
                {l:"記録した日数",v:String(dailyMinArr.length),u:"日"},
                {l:"はじめから",v:`${diffStart>0?"+":""}${diffStart.toFixed(1)}`,u:"kg",c:diffStart<=0?T.success:T.danger},
              ].map((s,i)=>(
                <div key={i} style={{...card,marginBottom:0}}>
                  <div style={{fontSize:11,color:T.muted,fontWeight:500,marginBottom:4}}>{s.l}</div>
                  <div style={{display:"flex",alignItems:"baseline",gap:2}}>
                    <span style={{fontSize:20,fontWeight:700,color:s.c||T.fg,...mono}}>{s.v}</span>
                    <span style={{fontSize:12,color:T.muted}}>{s.u}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>}

        {/* ══ MEALS ══ */}
        {tab==="meals" && (()=>{
          const mealsByDate={};
          meals.forEach(m=>{ if(!mealsByDate[m.date])mealsByDate[m.date]=[]; mealsByDate[m.date].push(m); });
          const mealDates=Object.keys(mealsByDate).sort().reverse();
          const calPct=calGoal>0?Math.min(100,(dayCal/calGoal)*100):0;
          const calCleared=calGoal>0&&dayCal>0&&dayCal<=calGoal;
          const calOver=calGoal>0&&dayCal>calGoal;
          return <div>
            <div style={card}>
              <div style={{fontSize:14,fontWeight:700,color:T.fg,marginBottom:12,fontFamily:T.fontTitle}}>🍽️ ごはんメモ</div>
              <div style={{marginBottom:12}}><div style={lbl}>日付</div><input type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)} style={inp}/></div>
              <div style={{marginBottom:12}}><div style={lbl}>なにたべた？</div><input type="text" value={mealText} onChange={e=>setMealText(e.target.value)} placeholder="焼肉食べ放題" style={inp} onKeyDown={e=>e.key==="Enter"&&addMeal()}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                <div><div style={lbl}>カロリー (kcal)</div><input type="number" value={mealCalorie} onChange={e=>setMealCalorie(e.target.value)} placeholder="800" style={{...inp,...mono}} onKeyDown={e=>e.key==="Enter"&&addMeal()}/></div>
                <div><div style={lbl}>たんぱく質 (g)</div><input type="number" value={mealProtein} onChange={e=>setMealProtein(e.target.value)} placeholder="30" style={{...inp,...mono}} onKeyDown={e=>e.key==="Enter"&&addMeal()}/></div>
              </div>
              <button onClick={addMeal} style={btnP}>きろくする</button>
            </div>
            {calGoal>0 && <div style={card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:13,fontWeight:700,color:T.fg,fontFamily:T.fontTitle}}>
                  {selectedDate===todayStr()?"きょう":fmtDate(selectedDate)} のカロリー
                  {calCleared && <span style={{marginLeft:8,fontSize:16}}>🌸</span>}
                </div>
                <div style={{fontSize:12,color:calOver?T.danger:T.muted,...mono,fontWeight:600}}>{dayCal} / {calGoal} kcal</div>
              </div>
              <div style={{background:T.accentBg,borderRadius:4,height:8,overflow:"hidden",marginBottom:6}}>
                <div style={{height:"100%",borderRadius:4,width:`${calPct}%`,background:calOver?T.danger:calCleared?T.success:T.accent,transition:`width 200ms ${T.ease}`}}/>
              </div>
              <div style={{fontSize:11,color:T.muted}}>
                {calCleared?"🌸 目標クリア！すごい！":calOver?`⚠️ 目標より ${dayCal-calGoal} kcal オーバー`:calGoal>0&&dayCal>0?`あと ${calGoal-dayCal} kcal`:"まだ記録がないよ"}
              </div>
            </div>}
            {proteinGoal>0 && (() => {
              const ptPct=Math.min(100,(dayProtein/proteinGoal)*100);
              const ptCleared=dayProtein>=proteinGoal;
              return <div style={card}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:13,fontWeight:700,color:T.fg,fontFamily:T.fontTitle}}>
                    {selectedDate===todayStr()?"きょう":fmtDate(selectedDate)} のたんぱく質
                    {ptCleared && <span style={{marginLeft:8,fontSize:16}}>💪</span>}
                  </div>
                  <div style={{fontSize:12,color:ptCleared?T.success:T.muted,...mono,fontWeight:600}}>{dayProtein} / {proteinGoal} g</div>
                </div>
                <div style={{background:"#e8f5e9",borderRadius:4,height:8,overflow:"hidden",marginBottom:6}}>
                  <div style={{height:"100%",borderRadius:4,width:`${ptPct}%`,background:ptCleared?T.success:"#66bb6a",transition:`width 200ms ${T.ease}`}}/>
                </div>
                <div style={{fontSize:11,color:T.muted}}>
                  {ptCleared?"💪 目標たっせい！":dayProtein>0?`あと ${proteinGoal-dayProtein} g`:"まだ記録がないよ"}
                </div>
              </div>;
            })()}
            <div style={card}>
              <div style={{fontSize:14,fontWeight:700,color:T.fg,marginBottom:12,fontFamily:T.fontTitle}}>{selectedDate===todayStr()?"きょう":fmtDate(selectedDate)} のごはん</div>
              {dayMeals.length===0?<div style={{textAlign:"center",padding:24,color:T.muted,fontSize:13}}>まだ記録がないよ</div>
              :dayMeals.map(m=>(
                <div key={m.id} style={{padding:"8px 0",borderBottom:`0.5px solid ${T.borderSubtle}`}}>
                  {editingMeal===m.id ? (
                    <div>
                      <input type="text" value={editMealText} onChange={e=>setEditMealText(e.target.value)} style={{...inp,marginBottom:6}} autoFocus onKeyDown={e=>e.key==="Escape"&&setEditingMeal(null)}/>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
                        <input type="number" value={editMealCalorie} onChange={e=>setEditMealCalorie(e.target.value)} placeholder="kcal" style={{...inp,...mono,padding:"8px 12px"}}/>
                        <input type="number" value={editMealProtein} onChange={e=>setEditMealProtein(e.target.value)} placeholder="g たんぱく質" style={{...inp,...mono,padding:"8px 12px"}}/>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={saveEditMeal} style={{flex:1,padding:"8px",border:"none",borderRadius:T.r1,background:T.accent,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:T.font,display:"inline-flex",alignItems:"center",justifyContent:"center",gap:4}}><IcoCheck/>保存</button>
                        <button onClick={()=>setEditingMeal(null)} style={{padding:"8px 12px",border:`1px solid ${T.border}`,borderRadius:T.r1,background:"transparent",color:T.secondary,fontSize:13,cursor:"pointer",fontFamily:T.font}}>キャンセル</button>
                      </div>
                    </div>
                  ) : (
                    <div className="rh" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontSize:14,color:T.fg,fontWeight:500}}>{m.text}</div>
                        <div style={{display:"flex",gap:8,marginTop:2}}>
                          {m.calorie!=null&&<span style={{fontSize:11,color:T.muted,...mono}}>{m.calorie} kcal</span>}
                          {m.protein!=null&&<span style={{fontSize:11,color:"#66bb6a",...mono}}>たんぱく質 {m.protein} g</span>}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:4}}>
                        <button className="di" onClick={()=>startEditMeal(m)} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",padding:4,opacity:0,transition:`opacity ${T.dur}`,display:"inline-flex",alignItems:"center"}}><IcoPencil/></button>
                        <button className="di" onClick={()=>saveM(meals.filter(x=>x.id!==m.id))} style={{background:"none",border:"none",color:T.faint,cursor:"pointer",padding:4,opacity:0,transition:`opacity ${T.dur}`,display:"inline-flex",alignItems:"center"}}><IcoX/></button>
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
            {mealDates.length>0 && <div style={card}>
              <div style={{fontSize:14,fontWeight:700,color:T.fg,marginBottom:12,fontFamily:T.fontTitle}}>📅 日別カロリー一覧</div>
              {mealDates.map((date,di)=>{
                const dm=mealsByDate[date];
                const dc=dm.reduce((s,m)=>s+(m.calorie||0),0);
                const dp=dm.reduce((s,m)=>s+(m.protein||0),0);
                const cleared=calGoal>0&&dc>0&&dc<=calGoal;
                const over=calGoal>0&&dc>calGoal;
                const isExp=mealHistoryDate===date;
                return (
                  <div key={date} style={{borderBottom:di<mealDates.length-1?`0.5px solid ${T.borderSubtle}`:"none"}}>
                    <div onClick={()=>setMealHistoryDate(isExp?null:date)}
                      style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",cursor:"pointer"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:13,color:T.secondary,...mono}}>{fmtDate(date)}</span>
                        {cleared&&<span style={{fontSize:14}}>🌸</span>}
                        {over&&<span style={{fontSize:11,color:T.danger}}>オーバー</span>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        {dp>0&&<span style={{fontSize:12,color:"#66bb6a",...mono}}>💪{dp}g</span>}
                        {dc>0&&<span style={{fontSize:13,fontWeight:700,color:over?T.danger:cleared?T.success:T.fg,...mono}}>{dc} kcal</span>}
                        {dc===0&&<span style={{fontSize:11,color:T.faint}}>カロリー未記録</span>}
                        <span style={{fontSize:10,color:T.faint,transform:isExp?"rotate(180deg)":"rotate(0)",transition:`transform ${T.dur} ${T.ease}`,display:"inline-block"}}>▾</span>
                      </div>
                    </div>
                    {isExp && <div style={{paddingBottom:8}}>
                      {dm.map(m=>(
                        <div key={m.id} style={{padding:"4px 0 4px 16px"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <span style={{fontSize:13,color:T.fg}}>{m.text}</span>
                            <div style={{display:"flex",gap:8,alignItems:"center"}}>
                              {m.protein!=null&&<span style={{fontSize:11,color:"#66bb6a",...mono}}>{m.protein}g</span>}
                              {m.calorie!=null&&<span style={{fontSize:12,color:T.muted,...mono}}>{m.calorie} kcal</span>}
                              <button onClick={(e)=>{e.stopPropagation();setTab("meals");setSelectedDate(date);setTimeout(()=>startEditMeal(m),50);}} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",padding:2,display:"inline-flex",alignItems:"center"}}><IcoPencil/></button>
                              <button onClick={(e)=>{e.stopPropagation();saveM(meals.filter(x=>x.id!==m.id));}} style={{background:"none",border:"none",color:T.faint,cursor:"pointer",padding:2,display:"inline-flex",alignItems:"center"}}><IcoX/></button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>}
                  </div>
                );
              })}
            </div>}
          </div>;
        })()}

        {/* ══ SETTINGS ══ */}
        {tab==="settings" && <div>
          <div style={card}>
            <div style={{fontSize:14,fontWeight:700,color:T.fg,marginBottom:16,fontFamily:T.fontTitle}}>⚙️ せってい</div>
            {/* タイトル */}
            <div style={{marginBottom:24}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:13,color:T.secondary}}>📝 アプリの題名</div>
                {!editingTitle&&<button onClick={()=>{setEditingTitle(true);setTempTitle(appTitle);}} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:6,padding:"4px 8px",fontSize:11,color:T.secondary,cursor:"pointer",fontFamily:T.font}}>変更</button>}
              </div>
              {editingTitle?(
                <div style={{display:"flex",gap:8}}>
                  <input type="text" value={tempTitle} onChange={e=>setTempTitle(e.target.value)} style={{...inp,flex:1}} autoFocus
                    onKeyDown={e=>{if(e.key==="Enter"&&tempTitle.trim()){saveTitle(tempTitle.trim());setEditingTitle(false);showToast("題名をかえたよ 🌸");}}}/>
                  <button onClick={()=>{if(tempTitle.trim()){saveTitle(tempTitle.trim());setEditingTitle(false);showToast("題名をかえたよ 🌸");}}}
                    style={{padding:"8px 16px",border:"none",borderRadius:T.r1,background:T.accent,color:"#fff",fontWeight:600,cursor:"pointer",fontFamily:T.font,fontSize:13}}>OK</button>
                </div>
              ):<div style={{fontSize:18,fontWeight:700,color:T.accent,fontFamily:T.fontTitle}}>{appTitle}</div>}
            </div>
            {/* 目標体重 */}
            <div style={{marginBottom:24}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:8,color:T.secondary,fontSize:13}}><IcoTarget/><span>目標体重</span></div>
                {!editingGoal&&<button onClick={()=>{setEditingGoal(true);setTempGoal(String(goalWeight));}} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:6,padding:"4px 8px",fontSize:11,color:T.secondary,cursor:"pointer",fontFamily:T.font}}>変更</button>}
              </div>
              {editingGoal?(
                <div style={{display:"flex",gap:8}}>
                  <input type="number" step="0.1" value={tempGoal} onChange={e=>setTempGoal(e.target.value)} style={{...inp,flex:1,...mono}} autoFocus
                    onKeyDown={e=>{if(e.key==="Enter"&&tempGoal&&!isNaN(Number(tempGoal))){saveG(Number(tempGoal));setEditingGoal(false);showToast("目標をかえたよ ✿");}}}/>
                  <button onClick={()=>{if(tempGoal&&!isNaN(Number(tempGoal))){saveG(Number(tempGoal));setEditingGoal(false);showToast("目標をかえたよ ✿");}}}
                    style={{padding:"8px 16px",border:"none",borderRadius:T.r1,background:T.accent,color:"#fff",fontWeight:600,cursor:"pointer",fontFamily:T.font,fontSize:13}}>OK</button>
                </div>
              ):<div style={{fontSize:28,fontWeight:700,color:T.accent,...mono}}>{goalWeight}<span style={{fontSize:14,fontWeight:400,color:T.muted,marginLeft:4}}>kg</span></div>}
            </div>
            {/* スタート体重 */}
            <div style={{marginBottom:24}}>
              <div style={{fontSize:13,color:T.secondary,marginBottom:8}}>スタートの体重</div>
              <div style={{fontSize:20,fontWeight:700,color:T.secondary,...mono}}>{startWeight}<span style={{fontSize:13,fontWeight:400,color:T.muted,marginLeft:4}}>kg</span></div>
            </div>
            {/* カロリー目標 */}
            <div style={{marginBottom:24,paddingTop:16,borderTop:`0.5px solid ${T.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:13,color:T.secondary}}>🍽️ 1日のカロリー目標</div>
                {!editingCalGoal&&<button onClick={()=>{setEditingCalGoal(true);setTempCalGoal(String(calGoal));}} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:6,padding:"4px 8px",fontSize:11,color:T.secondary,cursor:"pointer",fontFamily:T.font}}>変更</button>}
              </div>
              {editingCalGoal?(
                <div style={{display:"flex",gap:8}}>
                  <input type="number" value={tempCalGoal} onChange={e=>setTempCalGoal(e.target.value)} style={{...inp,flex:1,...mono}} autoFocus
                    onKeyDown={e=>{if(e.key==="Enter"&&tempCalGoal&&!isNaN(Number(tempCalGoal))){saveCG(Number(tempCalGoal));setEditingCalGoal(false);showToast("カロリー目標をかえたよ 🌸");}}}/>
                  <button onClick={()=>{if(tempCalGoal&&!isNaN(Number(tempCalGoal))){saveCG(Number(tempCalGoal));setEditingCalGoal(false);showToast("カロリー目標をかえたよ 🌸");}}}
                    style={{padding:"8px 16px",border:"none",borderRadius:T.r1,background:T.accent,color:"#fff",fontWeight:600,cursor:"pointer",fontFamily:T.font,fontSize:13}}>OK</button>
                </div>
              ):<div style={{fontSize:28,fontWeight:700,color:T.accent,...mono}}>{calGoal}<span style={{fontSize:14,fontWeight:400,color:T.muted,marginLeft:4}}>kcal</span></div>}
            </div>
            {/* たんぱく質目標 */}
            <div style={{marginBottom:24,paddingTop:16,borderTop:`0.5px solid ${T.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:13,color:T.secondary}}>💪 1日のたんぱく質目標</div>
                {!editingProteinGoal&&<button onClick={()=>{setEditingProteinGoal(true);setTempProteinGoal(String(proteinGoal));}} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:6,padding:"4px 8px",fontSize:11,color:T.secondary,cursor:"pointer",fontFamily:T.font}}>変更</button>}
              </div>
              {editingProteinGoal?(
                <div style={{display:"flex",gap:8}}>
                  <input type="number" value={tempProteinGoal} onChange={e=>setTempProteinGoal(e.target.value)} style={{...inp,flex:1,...mono}} autoFocus
                    onKeyDown={e=>{if(e.key==="Enter"&&tempProteinGoal&&!isNaN(Number(tempProteinGoal))){savePG(Number(tempProteinGoal));setEditingProteinGoal(false);showToast("たんぱく質目標をかえたよ 💪");}}}/>
                  <button onClick={()=>{if(tempProteinGoal&&!isNaN(Number(tempProteinGoal))){savePG(Number(tempProteinGoal));setEditingProteinGoal(false);showToast("たんぱく質目標をかえたよ 💪");}}}
                    style={{padding:"8px 16px",border:"none",borderRadius:T.r1,background:T.accent,color:"#fff",fontWeight:600,cursor:"pointer",fontFamily:T.font,fontSize:13}}>OK</button>
                </div>
              ):<div style={{fontSize:28,fontWeight:700,color:T.accent,...mono}}>{proteinGoal}<span style={{fontSize:14,fontWeight:400,color:T.muted,marginLeft:4}}>g</span></div>}
            </div>
            {/* リセット */}
            <div style={{borderTop:`0.5px solid ${T.border}`,paddingTop:16}}>
              <button onClick={()=>{
                if(window.confirm("ほんとうに全部けしていい？")){
                  [STORAGE_KEYS.records,STORAGE_KEYS.meals,STORAGE_KEYS.goal,STORAGE_KEYS.calGoal,STORAGE_KEYS.proteinGoal].forEach(k=>localStorage.removeItem(k));
                  setRecords([]);setMeals([]);setGoalWeight(90);setCalGoal(1800);setProteinGoal(80);showToast("リセットしました");
                }
              }} style={{width:"100%",padding:"12px 16px",border:`1px solid ${T.dangerBg}`,borderRadius:T.r1,background:"transparent",color:T.danger,fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:T.font,display:"inline-flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <IcoTrash/><span>データをリセット</span>
              </button>
            </div>
          </div>
        </div>}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<WeightTracker/>);
